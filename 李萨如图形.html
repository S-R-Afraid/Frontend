<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Instance Lissajous</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* 容器样式 */
        .canvas-wrapper {
            position: relative;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* 标题和按钮区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        h3 {
            margin: 0;
            font-size: 16px;
            color: #ccc;
        }

        /* 画布容器 */
        .sketch-container {
            width: 600px;
            /* 固定宽度以便演示布局，实际可自适应 */
            height: 600px;
            background: #000;
            overflow: hidden;
            border-radius: 4px;
        }

        /* 按钮通用样式 */
        .toggle-btn {
            padding: 6px 12px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .toggle-btn:hover {
            background-color: #444;
        }

        .toggle-btn.active {
            background-color: #2e7d32;
            border-color: #4caf50;
        }
    </style>
    <!-- 引入 p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
</head>

<body>

    <!-- 实例 1 的结构 -->
    <div class="canvas-wrapper">
        <div class="header">
            <h3>Instance A (Standard)</h3>
            <button id="btn-1" class="toggle-btn">模式: 自动重绘</button>
        </div>
        <!-- p5 画布将挂载在这里 -->
        <div id="canvas-container-1" class="sketch-container"></div>
    </div>

    <!-- 实例 2 的结构 -->
    <div class="canvas-wrapper">
        <div class="header">
            <h3>Instance B (Fast & Small)</h3>
            <button id="btn-2" class="toggle-btn">模式: 自动重绘</button>
        </div>
        <!-- p5 画布将挂载在这里 -->
        <div id="canvas-container-2" class="sketch-container"></div>
    </div>

    <script>
        /**
         * 封装的李萨如系统类
         */
        class LissajousSystem {
            /**
             * @param {string} containerId - 挂载画布的 DOM ID
             * @param {Object} options - 配置对象
             */
            constructor(containerId, options = {}) {
                // 默认配置
                const defaults = {
                    colCount: 8,
                    rowCount: 5,
                    baseSpeed: 0.015,
                    circleScale: 0.75,
                    keepPath: false, // 初始是否保留路径
                    pointSize: 5,
                    strokeWeight: 1.5,
                    hueStartX: 0,   // X轴颜色起始色相
                    hueStartY: 340  // Y轴颜色起始色相
                };

                // 合并配置
                this.config = Object.assign({}, defaults, options);
                this.containerId = containerId;

                // 内部状态
                this.curves = [];
                this.xControllers = [];
                this.yControllers = [];
                this.angle = 0;
                this.cycleCount = 0;
                this.w = 0;
                this.h = 0;

                // 创建 p5 实例
                this.myp5 = new p5(this.sketch.bind(this), containerId);
            }

            // p5 实例模式的核心 sketch 函数
            sketch(p) {
                // 将 p 挂载到类实例上，方便其他方法调用
                this.p = p;

                p.setup = () => {
                    // 获取容器尺寸
                    const container = document.getElementById(this.containerId);
                    const w = container.offsetWidth;
                    const h = container.offsetHeight;

                    p.createCanvas(w, h);
                    p.colorMode(p.RGB);
                    this.initialize();
                };

                p.draw = () => {
                    p.background(18, 18, 18);

                    let d = this.w * this.config.circleScale;
                    let r = d / 2;

                    p.noFill();

                    // 1. 绘制控制器
                    this.drawControllers(p, r, d);

                    // 2. 绘制曲线
                    let stopRecording = this.config.keepPath && this.cycleCount >= 1;

                    for (let j = 0; j < this.config.rowCount; j++) {
                        for (let i = 0; i < this.config.colCount; i++) {
                            let cx = this.xControllers[i].currentVal;
                            let cy = this.yControllers[j].currentVal;

                            let curveObj = this.curves[j][i];

                            if (!stopRecording) {
                                curveObj.addPoint(cx, cy);
                            }
                            curveObj.show(cx, cy);
                        }
                    }

                    // 3. 更新角度
                    this.angle -= this.config.baseSpeed;

                    // 4. 周期检测
                    if (this.angle < -p.TWO_PI) {
                        this.angle = 0;
                        this.cycleCount++;

                        if (!this.config.keepPath) {
                            this.cycleCount = 0;
                            this.resetCurves();
                        }
                    }
                };

                // 监听窗口大小变化（针对容器响应式）
                p.windowResized = () => {
                    const container = document.getElementById(this.containerId);
                    // 仅当容器尺寸确实改变时才重置，避免不必要的闪烁
                    if (container.offsetWidth !== p.width || container.offsetHeight !== p.height) {
                        p.resizeCanvas(container.offsetWidth, container.offsetHeight);
                        this.initialize();
                    }
                };
            }

            initialize() {
                const p = this.p;
                // 计算每个格子大小
                this.w = p.width / (this.config.colCount + 1);
                this.h = p.height / (this.config.rowCount + 1);
                let cellSize = Math.min(this.w, this.h); // 保持正圆
                this.w = cellSize;
                this.h = cellSize;

                this.curves = [];
                this.xControllers = [];
                this.yControllers = [];
                this.angle = 0;
                this.cycleCount = 0;

                // 初始化 X轴
                for (let i = 0; i < this.config.colCount; i++) {
                    p.colorMode(p.HSB);
                    let hue = p.map(i, 0, this.config.colCount, this.config.hueStartX, this.config.hueStartX + 300) % 360;
                    let c = p.color(hue, 80, 100);
                    p.colorMode(p.RGB);

                    this.xControllers.push({
                        speed: i + 1,
                        color: c,
                        cx: (i + 1) * this.w + this.w / 2,
                        cy: this.w / 2,
                        currentVal: 0
                    });
                }

                // 初始化 Y轴
                for (let j = 0; j < this.config.rowCount; j++) {
                    p.colorMode(p.HSB);
                    let hue = p.map(j, 0, this.config.rowCount, this.config.hueStartY, this.config.hueStartY + 100) % 360;
                    let c = p.color(hue, 80, 100);
                    p.colorMode(p.RGB);

                    this.yControllers.push({
                        speed: j + 1,
                        color: c,
                        cx: this.w / 2,
                        cy: (j + 1) * this.h + this.h / 2,
                        currentVal: 0
                    });
                }

                // 初始化网格曲线
                for (let j = 0; j < this.config.rowCount; j++) {
                    let row = [];
                    for (let i = 0; i < this.config.colCount; i++) {
                        let c1 = this.xControllers[i].color;
                        let c2 = this.yControllers[j].color;
                        let blended = p.lerpColor(c1, c2, 0.5);
                        row.push(new Curve(p, blended, this.config.strokeWeight, this.config.pointSize));
                    }
                    this.curves.push(row);
                }
            }

            drawControllers(p, r, d) {
                // X轴
                for (let i = 0; i < this.config.colCount; i++) {
                    let ctrl = this.xControllers[i];
                    this.drawSingleController(p, ctrl, r, d, true);
                }
                // Y轴
                for (let j = 0; j < this.config.rowCount; j++) {
                    let ctrl = this.yControllers[j];
                    this.drawSingleController(p, ctrl, r, d, false);
                }
            }

            drawSingleController(p, ctrl, r, d, isVertical) {
                p.stroke(p.red(ctrl.color), p.green(ctrl.color), p.blue(ctrl.color), 80);
                p.strokeWeight(1);
                p.ellipse(ctrl.cx, ctrl.cy, d, d);

                let ox = r * p.cos(this.angle * ctrl.speed - p.HALF_PI);
                let oy = r * p.sin(this.angle * ctrl.speed - p.HALF_PI);

                if (isVertical) {
                    ctrl.currentVal = ctrl.cx + ox;
                    p.stroke(255, 30);
                    p.line(ctrl.cx + ox, 0, ctrl.cx + ox, p.height);
                } else {
                    ctrl.currentVal = ctrl.cy + oy;
                    p.stroke(255, 30);
                    p.line(0, ctrl.cy + oy, p.width, ctrl.cy + oy);
                }

                p.stroke(ctrl.color);
                p.strokeWeight(5);
                p.point(ctrl.cx + ox, ctrl.cy + oy);
            }

            resetCurves() {
                for (let row of this.curves) {
                    for (let curve of row) {
                        curve.reset();
                    }
                }
            }

            // --- 公共 API：绑定按钮 ---
            bindButton(btnId) {
                const btn = document.getElementById(btnId);
                if (!btn) return;

                // 初始化按钮状态
                this.updateButtonUI(btn);

                // 绑定点击事件
                btn.addEventListener('click', () => {
                    this.toggleMode(btn);
                });
            }

            toggleMode(btnElement) {
                this.config.keepPath = !this.config.keepPath;
                this.updateButtonUI(btnElement);
                this.initialize(); // 重置画面以应用新模式
            }

            updateButtonUI(btn) {
                if (this.config.keepPath) {
                    btn.innerText = "当前模式: 保留图案";
                    btn.classList.add('active');
                } else {
                    btn.innerText = "当前模式: 自动重绘";
                    btn.classList.remove('active');
                }
            }
        }

        /**
         * 曲线辅助类
         */
        class Curve {
            constructor(p5Instance, color, weight, pSize) {
                this.p = p5Instance; // 持有 p5 实例的引用
                this.color = color;
                this.weight = weight;
                this.pSize = pSize;
                this.path = [];
            }

            addPoint(x, y) {
                this.path.push({ x, y });
            }

            reset() {
                this.path = [];
            }

            show(cx, cy) {
                const p = this.p;
                p.stroke(this.color);
                p.strokeWeight(this.weight);
                p.noFill();

                p.beginShape();
                for (let v of this.path) {
                    p.vertex(v.x, v.y);
                }
                p.endShape();

                p.stroke(255);
                p.strokeWeight(this.pSize);
                p.point(cx, cy);
            }
        }

        // ================= 初始化 =================

        // 1. 创建第一个实例 (标准配置)
        const instance1 = new LissajousSystem('canvas-container-1', {
            colCount: 8,
            rowCount: 8,
            baseSpeed: 0.015,
            keepPath: false
        });
        // 绑定按钮 ID
        instance1.bindButton('btn-1');

        // 2. 创建第二个实例 (自定义配置：更少圈圈，更快速度，默认保留)
        const instance2 = new LissajousSystem('canvas-container-2', {
            colCount: 4,
            rowCount: 4,
            baseSpeed: 0.04, // 更快
            keepPath: true,  // 默认保留
            hueStartX: 100,  // 不同的颜色起始点
            hueStartY: 200
        });
        // 绑定按钮 ID
        instance2.bindButton('btn-2');

    </script>
</body>

</html>
