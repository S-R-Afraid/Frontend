<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>事件注册</title>
</head>

<body>

    <button id="btn">点击</button>
    <input type="text" id="txt">

    <script>
        var btn = document.getElementById("btn");
        var txt = document.getElementById("txt");

        btn.onclick = function () {
            alert("click 事件");
        };

        txt.onchange = function () {
            alert("change 事件");
        };
    </script>

</body>

</html>
<!--
1️⃣ 注册事件方式
方式一：属性（简单题）
btn.onclick = function() {
  alert("点击");
}

方式二：标准（推荐，常考）
btn.addEventListener("click", function() {
  alert("点击");
});

2️⃣ 常见事件类型（选择题）（表单相关事件在03里）
事件	说明
click	点击
change	内容改变（checkbox / select）
submit	表单提交
input	输入时触发
load	页面加载完成
mouseover / mouseout	鼠标移入移出

3️⃣ 阻止默认行为（表单验证必考）
event.preventDefault();

load 事件用法
<script>
    window.addEventListener("load", function () {
        console.log("页面加载完成");
    });
</script>

-->
