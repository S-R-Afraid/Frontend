<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>setTimeout</title>
</head>

<body>

  <p>3 秒后显示提示</p>

  <script>
    setTimeout(function () {
      alert("3 秒到了");
    }, 3000);
  </script>

</body>

</html>
<!--
1️⃣ 两种定时器（简答必考）
setTimeout(fn, time);   // 延迟执行一次
setInterval(fn, time); // 每隔时间执行

2️⃣ 清除定时器
clearTimeout(timer);
clearInterval(timer);
-->
