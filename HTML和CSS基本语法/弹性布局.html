<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Flex 弹性布局演示</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Arial;
  padding: 20px;
}
h2 {
  margin: 20px 0 10px;
}
.box {
  border: 2px solid #333;
  margin-bottom: 30px;
  padding: 10px;
}

/* 公共子项样式 */
.item {
  background-color: #4caf50;
  color: white;
  padding: 20px;
  margin: 5px;
  text-align: center;
}
</style>
</head>
<body>

<h1>Flex 弹性布局演示</h1>

<!-- 1. 主轴方向 -->
<h2>1️⃣ 主轴方向（flex-direction）</h2>
<div class="box" style="display:flex; flex-direction:row;">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
</div>

<div class="box" style="display:flex; flex-direction:column;">
  <div class="item">A</div>
  <div class="item">B</div>
  <div class="item">C</div>
</div>

<!-- 2. 主轴对齐 -->
<h2>2️⃣ 主轴对齐（justify-content）</h2>
<div class="box" style="display:flex; justify-content:space-between;">
  <div class="item">左</div>
  <div class="item">中</div>
  <div class="item">右</div>
</div>

<!-- 3. 交叉轴对齐 -->
<h2>3️⃣ 交叉轴对齐（align-items）</h2>
<div class="box" style="display:flex; height:120px; align-items:center;">
  <div class="item">垂直居中</div>
  <div class="item">垂直居中</div>
</div>

<!-- 4. 水平 + 垂直居中 -->
<h2>4️⃣ 水平 + 垂直居中（必考）</h2>
<div class="box" style="
  display:flex;
  justify-content:center;
  align-items:center;
  height:150px;">
  <div class="item">居中</div>
</div>

<!-- 5. 等分布局 -->
<h2>5️⃣ 等分布局（flex:1）</h2>
<div class="box" style="display:flex;">
  <div class="item" style="flex:1;">1</div>
  <div class="item" style="flex:1;">1</div>
  <div class="item" style="flex:1;">1</div>
</div>

<!-- 6. 导航条 -->
<h2>6️⃣ Flex 导航条</h2>
<ul style="
  display:flex;
  list-style:none;
  background:#333;">
  <li><a href="#" style="color:white;padding:15px;display:block;">首页</a></li>
  <li><a href="#" style="color:white;padding:15px;display:block;">新闻</a></li>
  <li><a href="#" style="color:white;padding:15px;display:block;">关于</a></li>
</ul>

</body>
</html>
