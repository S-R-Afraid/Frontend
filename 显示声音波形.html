<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频波形展示</title>
    <style>
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>

<body>
    <h2>上传音乐文件并播放展示波形</h2>
    <input type="file" id="musicFileInput" accept="audio/*">
    <canvas id="uploadedWaveformCanvas" width="800" height="200"></canvas>
    <audio id="uploadedAudio" controls></audio>

    <script>
        // 上传音乐文件并播放展示波形相关
        const uploadedCanvas = document.getElementById('uploadedWaveformCanvas');
        const uploadedCtx = uploadedCanvas.getContext('2d');
        const musicFileInput = document.getElementById('musicFileInput');
        const uploadedAudio = document.getElementById('uploadedAudio');
        let uploadedAudioContext;
        let uploadedAnalyser;
        let audioBuffer;
        let animationFrameId;

        musicFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const audioData = event.target.result;
                    if (!uploadedAudioContext) {
                        uploadedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    audioBuffer = await uploadedAudioContext.decodeAudioData(audioData);
                    uploadedAnalyser = uploadedAudioContext.createAnalyser();
                    uploadedAnalyser.fftSize = 2048;
                    const bufferLength = uploadedAnalyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);

                    function drawUploadedWave() {
                        animationFrameId = requestAnimationFrame(drawUploadedWave);
                        uploadedAnalyser.getByteTimeDomainData(dataArray);
                        uploadedCtx.fillStyle = 'rgb(200, 200, 200)';
                        uploadedCtx.fillRect(0, 0, uploadedCanvas.width, uploadedCanvas.height);
                        uploadedCtx.lineWidth = 2;
                        uploadedCtx.strokeStyle = 'rgb(0, 0, 0)';
                        uploadedCtx.beginPath();

                        const sliceWidth = uploadedCanvas.width / bufferLength;
                        let x = 0;
                        for (let i = 0; i < bufferLength; i++) {
                            const v = dataArray[i] / 128.0;
                            const y = v * uploadedCanvas.height / 2;
                            if (i === 0) {
                                uploadedCtx.moveTo(x, y);
                            } else {
                                uploadedCtx.lineTo(x, y);
                            }
                            x += sliceWidth;
                        }
                        uploadedCtx.lineTo(uploadedCanvas.width, uploadedCanvas.height / 2);
                        uploadedCtx.stroke();
                    }

                    drawUploadedWave();
                    uploadedAudio.src = URL.createObjectURL(file);

                    // 处理播放和暂停
                    uploadedAudio.addEventListener('play', () => {
                        const source = uploadedAudioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(uploadedAnalyser);
                        source.start(0);
                    });

                    uploadedAudio.addEventListener('pause', () => {
                        const allSources = uploadedAudioContext.state === 'running'? uploadedAudioContext.destination.inputs[0].outputs[0]._sources : [];
                        allSources.forEach((source) => {
                            source.stop(0);
                        });
                        cancelAnimationFrame(animationFrameId);
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });
    </script>
</body>

</html>
